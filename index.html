<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Finder Owl | Home</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; }
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top:10px; }
        #result { margin-top: 20px; font-size: 1.2rem; color: #5d4037; }
        .btn-msg { background: #25D366; display: inline-block; margin-top: 10px; padding: 10px; color: white; text-decoration: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Finder Owl 🦉</h1>
        <div id="society-verification">
            <input type="text" id="societyInput" placeholder="Enter Society Name">
            <button id="verifyBtn">Proceed</button>
        </div>
        <div id="vehicle-search" style="display:none;">
            <p>Society: <span id="displaySocietyName" style="font-weight:bold;"></span></p>
            <input type="text" id="vehicleInput" placeholder="Enter Vehicle Number">
            <button id="searchBtn">Search</button>
            <div id="result"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEYKHQpy_VjmgjYiWQOPjXth1bghYsf9M",
            authDomain: "finder-owl.firebaseapp.com",
            projectId: "finder-owl",
            storageBucket: "finder-owl.firebasestorage.app",
            messagingSenderId: "1011347100861",
            appId: "1:1011347100861:web:24246f9a4eb24d812cd3d4"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentSociety = "";

        document.getElementById("verifyBtn").addEventListener("click", async () => {
            const input = document.getElementById("societyInput").value.trim().toLowerCase();
            const snap = await getDocs(collection(db, "societies"));
            const match = snap.docs.find(d => d.data().name.toLowerCase() === input);
            
            if (match) {
                currentSociety = match.data().name;
                document.getElementById("society-verification").style.display = "none";
                document.getElementById("vehicle-search").style.display = "block";
                document.getElementById("displaySocietyName").innerText = currentSociety;
            } else {
                alert("Society not found.");
            }
        });

        document.getElementById("searchBtn").addEventListener("click", async () => {
            const vNum = document.getElementById("vehicleInput").value.trim().toUpperCase();
            const snap = await getDocs(collection(db, "vehicles"));
            const found = snap.docs.find(d => {
                const data = d.data();
                return data.societyName.toLowerCase() === currentSociety.toLowerCase() && 
                       data.vehicleNumber.toUpperCase() === vNum;
            });
            
            const display = document.getElementById("result");
            if (found) {
                const data = found.data();
                const adminPhone = data.mobileNumber || "919033406816";
                const msg = encodeURIComponent("Hello, I have a query about my vehicle.");
                
                display.innerHTML = `
                    ✅ Vehicle registered.<br>
                    Flat: <b>${data.flatNumber || "N/A"}</b><br>
                    <a href="https://wa.me/${adminPhone}?text=${msg}" target="_blank" class="btn-msg">
                        💬 Message Admin
                    </a>
                `;
            } else {
                display.innerHTML = "❌ Not found.";
            }
        });
    </script>
</body>
</html>
