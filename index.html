<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Owl Watcher | Home</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; }
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top:10px; }
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 20px; border: 2px solid #8d6e63; width: 80%; max-width: 320px; border-radius: 20px; position: relative; }
        .close { color: #5d4037; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .btn-msg { background: #25D366; display: inline-block; margin-top: 10px; padding: 10px; color: white; text-decoration: none; border-radius: 10px; font-size: 1rem; }
        .admin-btn { display: inline-block; background: #8d6e63; color: white; padding: 10px 25px; text-decoration: none; border-radius: 10px; font-family: 'Caveat', cursive; font-size: 1.2rem; cursor: pointer; margin-top: 15px; }
        #notice-board { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 10px; font-family: sans-serif; background: #fdfdfd; }
        #notice-content { font-size: 1.1rem; font-weight: 500; color: #333; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Owl Watcher 🦉</h1>
        <div id="society-verification">
            <input type="text" id="societyInput" placeholder="Enter Society Name">
            <button id="verifyBtn">Proceed</button>
        </div>
        
        <div id="vehicle-search" style="display:none;">
            <p>Society: <span id="displaySocietyName" style="font-weight:bold;"></span></p>
            <input type="text" id="vehicleInput" placeholder="Enter Vehicle Number">
            <button id="searchBtn">Search</button>
            <div id="guard-container" style="margin-top:20px;"></div>
            <div id="notice-board">
                <h3>📢 Notice Board</h3>
                <div id="notice-content">Loading...</div>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #dcdde1; margin: 20px 0;">
        <a href="https://prsd503.github.io/Athena/admin.html" class="admin-btn">Admin Portal</a>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('resultModal').style.display='none'">&times;</span>
            <div id="result"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEYKHQpy_VjmgjYiWQOPjXth1bghYsf9M",
            authDomain: "finder-owl.firebaseapp.com",
            projectId: "finder-owl",
            storageBucket: "finder-owl.firebasestorage.app",
            messagingSenderId: "1011347100861",
            appId: "1:1011347100861:web:24246f9a4eb24d812cd3d4"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const modal = document.getElementById("resultModal");
        let currentSociety = "";

        // UI Helpers
        function showModal(content) { document.getElementById("result").innerHTML = content; modal.style.display = "block"; }
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; };

        // Guard Info Logic
        async function loadGuardInfo(societyId) {
            const snap = await getDoc(doc(db, "societies", societyId));
            if (snap.exists() && snap.data().activeGuardPhone) {
                const guard = snap.data();
                document.getElementById("guard-container").innerHTML = `
                    <div style="padding:15px; border:2px solid #8d6e63; border-radius:15px; background:#fdf6e3;">
                        <p style="margin:5px 0;">On Duty: <b>${guard.activeGuardName || "Security"}</b></p>
                        <a href="tel:${guard.activeGuardPhone}" style="background:#27ae60; color:white; padding:10px 20px; text-decoration:none; border-radius:10px; display:inline-block; font-family: 'Caveat', cursive;">📞 Call Security</a>
                    </div>`;
            }
        }

        // Notice Board Logic
        async function loadNotice(societyId) {
            const docRef = doc(db, "notices", societyId);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("notice-content").innerHTML = `<b>Today:</b> ${data.todayMessage}<br><b>Tomorrow:</b> ${data.tomorrowMessage || 'N/A'}`;
            } else {
                document.getElementById("notice-content").innerText = "No notices.";
            }
        }

        // Main Flow
        document.getElementById("verifyBtn").addEventListener("click", async () => {
            const input = document.getElementById("societyInput").value.trim().toLowerCase();
            const snap = await getDocs(collection(db, "societies"));
            const match = snap.docs.find(d => d.data().name?.toLowerCase() === input);
            if (match) {
                currentSociety = match.data().name;
                document.getElementById("society-verification").style.display = "none";
                document.getElementById("vehicle-search").style.display = "block";
                document.getElementById("displaySocietyName").innerText = currentSociety;
                loadGuardInfo(match.id);
                loadNotice(match.id);
            } else { showModal("<p>❌ Society not found.</p>"); }
        });

        document.getElementById("searchBtn").addEventListener("click", async () => {
            const vNum = document.getElementById("vehicleInput").value.trim().toUpperCase();
            const snap = await getDocs(collection(db, "vehicles"));
            const matches = snap.docs.filter(d => d.data().societyName?.toLowerCase() === currentSociety.toLowerCase() && d.data().vehicleNumber?.toUpperCase() === vNum);
            
            if (matches.length > 0) {
                let htmlContent = "";
                matches.forEach(found => {
                    const data = found.data();
                    const msg = encodeURIComponent(`(Using: Owl-Watcher) Hello, vehicle ${data.vehicleNumber} of ${data.flatNumber}`);
                    htmlContent += `<div>✅ Vehicle: <b>${data.vehicleNumber}</b><br>Flat: <b>${data.flatNumber}</b><br><a href="https://wa.me/${data.mobileNumber?.replace(/\D/g, '')}?text=${msg}" target="_blank" class="btn-msg">💬 Message Admin</a></div>`;
                });
                showModal(htmlContent);
            } else { showModal("<p>❌ Vehicle not found.</p>"); }
        });
    </script>
</body>
</html>
