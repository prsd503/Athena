<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Owl Watcher | Home</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; }
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top:10px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 20px; border: 2px solid #8d6e63; width: 80%; max-width: 320px; border-radius: 20px; }
        .close { color: #5d4037; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        /* Notice Board Styles */
        #notice-board { margin-top: 25px; padding: 20px; border: 1px solid #dcdde1; border-radius: 15px; background: #fcfcfc; text-align: left; }
        #notice-content { font-family: sans-serif; font-size: 1.05rem; line-height: 1.5; color: #2f3640; margin-top: 10px; overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; }
        .notice-date { font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }

        /* Billboard Slider Styles Optimization for 720x720 Square Artwork */
        .billboard { margin-top: 25px; padding: 15px; border: 2px dashed #8d6e63; border-radius: 15px; background: #fff8f5; text-align: center; overflow: hidden; position: relative; }
        .ad-slider-container { width: 100%; height: 340px; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; }
        .ad-slide { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 10px; }
        .ad-slide.active { display: block; }
        .ad-link { font-size: 0.9rem; color: #8d6e63; text-decoration: underline; display: inline-block; margin-top: 8px; }

        /* Billboard Navigation Controls */
        .ad-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
        .ad-nav-btn { background: #8d6e63; color: white; border: none; padding: 4px 12px; font-size: 0.9rem; border-radius: 6px; cursor: pointer; transition: background 0.2s; font-family: sans-serif; }
        .ad-nav-btn:hover { background: #6d4c41; }

        .btn-msg { background: #25D366; display: inline-block; margin-top: 10px; padding: 10px; color: white; text-decoration: none; border-radius: 10px; font-size: 1rem; }
        .admin-btn { display: inline-block; background: #8d6e63; color: white; padding: 10px 25px; text-decoration: none; border-radius: 10px; font-family: 'Caveat', cursive; font-size: 1.2rem; cursor: pointer; margin-top: 15px; }
        .switch-btn { background: #d32f2f; padding: 4px 10px; font-size: 0.9rem; border-radius: 6px; margin-left: 10px; cursor: pointer; display: inline-block; color: white; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Owl Watcher 🦉</h1>
        
        <div id="society-verification">
            <input type="text" id="societyInput" placeholder="Enter Society Name">
            <button id="verifyBtn">Proceed</button>
            
            <div id="global-ad-billboard" class="billboard">
                <h4 style="margin: 0 0 10px 0; font-family: 'Caveat', cursive; color: #8d6e63;">🌍 Sponsored Global Billboard 🌍</h4>
                <div class="ad-slider-container" id="globalAdSlider">
                    <p id="global-ad-placeholder" style="color: #a1887f;">Global advertising space available</p>
                </div>
                <div class="ad-controls" id="globalAdControls" style="display: none;">
                    <button class="ad-nav-btn" id="prevGlobalAdBtn">❮ Prev</button>
                    <button class="ad-nav-btn" id="nextGlobalAdBtn">Next ❯</button>
                </div>
                <a href="https://wa.me/919033406816?text=Hi%20I%20want%20to%20apply%20for%20global%20ad%20in%20Owl%20Watcher" target="_blank" class="ad-link">Advertise Globally Here!</a>
            </div>
        </div>
        
        <div id="vehicle-search" style="display:none;">
            <p style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                <span>Society: <span id="displaySocietyName" style="font-weight:bold;"></span></span>
                <button id="switchSocietyBtn" class="switch-btn">Change</button>
            </p>
            <input type="text" id="vehicleInput" placeholder="Enter Vehicle Number">
            <button id="searchBtn">Search</button>
            <div id="guard-container" style="margin-top:20px;"></div>
            
            <div id="notice-board">
                <h3 style="margin-top: 0; font-family: 'Caveat', cursive; border-bottom: 2px solid #8d6e63; padding-bottom: 5px;">📢 Notice Board</h3>
                <div id="notice-content">Loading...</div>
            </div>

            <div id="ad-billboard" class="billboard">
                <h4 style="margin: 0 0 10px 0; font-family: 'Caveat', cursive; color: #8d6e63;">✨ Community Billboard ✨</h4>
                <div class="ad-slider-container" id="adSlider">
                    <p id="ad-placeholder" style="color: #a1887f;">Space Available for Ad placement</p>
                </div>
                <div class="ad-controls" id="adControls" style="display: none;">
                    <button class="ad-nav-btn" id="prevAdBtn">❮ Prev</button>
                    <button class="ad-nav-btn" id="nextAdBtn">Next ❯</button>
                </div>
                <a href="ad.html" class="ad-link">Advertise Here!</a>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #dcdde1; margin: 20px 0;">
        <a href="https://prsd503.github.io/Athena/admin.html" target="_self" class="admin-btn">Admin Portal</a>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('resultModal').style.display='none'">&times;</span>
            <div id="result"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc, onSnapshot, query, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEYKHQpy_VjmgjYiWQOPjXth1bghYsf9M",
            authDomain: "finder-owl.firebaseapp.com",
            projectId: "finder-owl",
            storageBucket: "finder-owl.firebasestorage.app",
            messagingSenderId: "1011347100861",
            appId: "1:1011347100861:web:24246f9a4eb24d812cd3d4"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const modal = document.getElementById("resultModal");
        let currentSociety = "";
        let guardUnsubscribe = null;
        
        // Trackers for Local Billboard
        let adInterval = null;
        let currentIndex = 0;
        let totalSlides = 0;

        // Trackers for New Global Billboard
        let globalAdInterval = null;
        let globalCurrentIndex = 0;
        let globalTotalSlides = 0;

        function showModal(content) { document.getElementById("result").innerHTML = content; modal.style.display = "block"; }
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; };

        // 1. Auto-Switching Notice Board
        async function loadNotice(societyId) {
            const noticeDiv = document.getElementById('notice-content');
            const docRef = doc(db, "notices", societyId);
            const snap = await getDoc(docRef);
            const todayStr = new Date().toLocaleDateString('en-CA'); 

            if (snap.exists()) {
                let data = snap.data();
                let displayMsg = data.todayMessage;
                let storedDate = data.date || todayStr;

                if (storedDate < todayStr) {
                    displayMsg = data.tomorrowMessage || "No new notices.";
                    await setDoc(docRef, { todayMessage: displayMsg, tomorrowMessage: "", date: todayStr }, { merge: true });
                }
                noticeDiv.innerHTML = `<p class="notice-date">${todayStr}</p><div>${displayMsg || "No notices for today."}</div>`;
            } else { noticeDiv.innerText = "No notices for today."; }
        }

        // 2. Real-time Guard Info
        function setupGuard(societyId) {
            if (guardUnsubscribe) guardUnsubscribe();
            guardUnsubscribe = onSnapshot(doc(db, "societies", societyId), (snap) => {
                if (snap.exists() && snap.data().activeGuardName) {
                    const g = snap.data();
                    document.getElementById("guard-container").innerHTML = `
                        <div style="padding:10px; border:2px solid #8d6e63; border-radius:10px; background:#fdf6e3;">
                            <p style="margin:0;">On Duty: <b>${g.activeGuardName}</b></p>
                            <a href="tel:${g.activeGuardPhone}" class="btn-msg" style="background:#27ae60; margin-top:5px;">📞 Call Security</a>
                        </div>`;
                } else {
                    document.getElementById("guard-container").innerHTML = "";
                }
            });
        }

        // Slide switcher helpers
        function changeSlide(direction, isGlobal = false) {
            const sliderId = isGlobal ? "globalAdSlider" : "adSlider";
            const slider = document.getElementById(sliderId);
            const slides = slider.getElementsByClassName("ad-slide");
            if (slides.length <= 1) return;

            let idx = isGlobal ? globalCurrentIndex : currentIndex;
            slides[idx].classList.remove("active");
            
            if (direction === "next") {
                idx = (idx + 1) % slides.length;
            } else if (direction === "prev") {
                idx = (idx - 1 + slides.length) % slides.length;
            }
            
            slides[idx].classList.add("active");
            if (isGlobal) {
                globalCurrentIndex = idx;
            } else {
                currentIndex = idx;
            }
        }

        function startAdTimer(isGlobal = false) {
            if (isGlobal) {
                if (globalAdInterval) clearInterval(globalAdInterval);
                const slides = document.getElementById("globalAdSlider").getElementsByClassName("ad-slide");
                if (slides.length > 1) {
                    globalAdInterval = setInterval(() => changeSlide("next", true), 5000);
                }
            } else {
                if (adInterval) clearInterval(adInterval);
                const slides = document.getElementById("adSlider").getElementsByClassName("ad-slide");
                if (slides.length > 1) {
                    adInterval = setInterval(() => changeSlide("next", false), 5000);
                }
            }
        }

        // 3. Load Global/Public Advertisements (Landing View)
        async function loadGlobalAds() {
            const slider = document.getElementById("globalAdSlider");
            const controls = document.getElementById("globalAdControls");
            if (globalAdInterval) clearInterval(globalAdInterval);

            try {
                // Fetch ads explicitly tagged as global ads
                const q = query(
                    collection(db, "ads"),
                    where("type", "==", "global"),
                    where("societyApproved", "==", true),
                    where("owlWatcherApproved", "==", true),
                    limit(10)
                );
                
                const snap = await getDocs(q);
                if (snap.empty) {
                    slider.innerHTML = `<p id="global-ad-placeholder" style="color: #a1887f;">Global advertising space available</p>`;
                    controls.style.display = "none";
                    return;
                }

                slider.innerHTML = "";
                snap.forEach((doc) => {
                    const adData = doc.data();
                    if (adData.imageUrl) {
                        slider.innerHTML += `<img src="${adData.imageUrl}" class="ad-slide" alt="Global Community Ad">`;
                    }
                });

                const slides = slider.getElementsByClassName("ad-slide");
                globalTotalSlides = slides.length;
                globalCurrentIndex = 0;

                if (globalTotalSlides > 0) {
                    slides[globalCurrentIndex].classList.add("active");
                    if (globalTotalSlides > 1) {
                        controls.style.display = "flex"; 
                        startAdTimer(true);
                    } else {
                        controls.style.display = "none";
                    }
                }
            } catch (error) {
                console.error("Error setting up global ads: ", error);
            }
        }

        // 4. Load Society-Specific Advertisements (Verified View)
        async function loadAds(societyId) {
            const slider = document.getElementById("adSlider");
            const controls = document.getElementById("adControls");
            if(adInterval) clearInterval(adInterval);

            try {
                const q = query(
                    collection(db, "ads"), 
                    where("societyId", "==", societyId),
                    where("type", "==", "local"), // Filter to local ads only
                    where("societyApproved", "==", true),
                    where("owlWatcherApproved", "==", true)
                );
                
                const snap = await getDocs(q);
                if (snap.empty) {
                    slider.innerHTML = `<p id="ad-placeholder" style="color: #a1887f;">Space Available for Ad placement</p>`;
                    controls.style.display = "none";
                    return;
                }

                slider.innerHTML = "";
                snap.forEach((doc) => {
                    const adData = doc.data();
                    if (adData.imageUrl) {
                        slider.innerHTML += `<img src="${adData.imageUrl}" class="ad-slide" alt="Community Ad">`;
                    }
                });

                const slides = slider.getElementsByClassName("ad-slide");
                totalSlides = slides.length;
                currentIndex = 0;

                if (totalSlides > 0) {
                    slides[currentIndex].classList.add("active");
                    if (totalSlides > 1) {
                        controls.style.display = "flex"; 
                        startAdTimer(false);
                    } else {
                        controls.style.display = "none";
                    }
                }
            } catch (error) {
                console.error("Error setting up local ads: ", error);
            }
        }

        // Local Slider Listeners
        document.getElementById("nextAdBtn").addEventListener("click", () => {
            changeSlide("next", false);
            startAdTimer(false); 
        });
        document.getElementById("prevAdBtn").addEventListener("click", () => {
            changeSlide("prev", false);
            startAdTimer(false); 
        });

        // Global Slider Listeners
        document.getElementById("nextGlobalAdBtn").addEventListener("click", () => {
            changeSlide("next", true);
            startAdTimer(true); 
        });
        document.getElementById("prevGlobalAdBtn").addEventListener("click", () => {
            changeSlide("prev", true);
            startAdTimer(true); 
        });

        // UI Screen Transition
        function showSearchScreen(societyName, societyId) {
            currentSociety = societyName;
            document.getElementById("society-verification").style.display = "none";
            document.getElementById("vehicle-search").style.display = "block";
            document.getElementById("displaySocietyName").innerText = currentSociety;
            setupGuard(societyId);
            loadNotice(societyId);
            loadAds(societyId); 
        }

        // Verification Logic
        document.getElementById("verifyBtn").addEventListener("click", async () => {
            const input = document.getElementById("societyInput").value.trim().toLowerCase();
            if (!input) return showModal("<p>⚠️ Please enter a society name.</p>");
            
            const snap = await getDocs(collection(db, "societies"));
            const match = snap.docs.find(d => d.data().name?.toLowerCase() === input);
            if (match) {
                localStorage.setItem("savedSocietyName", match.data().name);
                localStorage.setItem("savedSocietyId", match.id);
                showSearchScreen(match.data().name, match.id);
            } else { showModal("<p>❌ Society not found.</p>"); }
        });

        // Vehicle Search Logic
        document.getElementById("searchBtn").addEventListener("click", async () => {
            const vNum = document.getElementById("vehicleInput").value.trim().toUpperCase();
            if (!vNum) return showModal("<p>⚠️ Please enter a vehicle number.</p>");
            
            const snap = await getDocs(collection(db, "vehicles"));
            const matches = snap.docs.filter(d => d.data().societyName?.toLowerCase() === currentSociety.toLowerCase() && d.data().vehicleNumber?.toUpperCase() === vNum);
            if (matches.length > 0) {
                let htmlContent = "";
                matches.forEach(found => {
                    const data = found.data();
                    const msg = encodeURIComponent(`(Using: Owl-Watcher) Hello, vehicle ${data.vehicleNumber} of ${data.flatNumber}`);
                    htmlContent += `<div style="margin-bottom:15px;">✅ Vehicle: <b>${data.vehicleNumber}</b><br>Flat: <b>${data.flatNumber}</b><br><a href="https://wa.me/${data.mobileNumber?.replace(/\D/g, '')}?text=${msg}" target="_blank" class="btn-msg">💬 Message Admin</a></div>`;
                });
                showModal(htmlContent);
            } else { showModal("<p>❌ Vehicle not found.</p>"); }
        });

        // Switch Society 
        document.getElementById("switchSocietyBtn").addEventListener("click", () => {
            localStorage.removeItem("savedSocietyName");
            localStorage.removeItem("savedSocietyId");
            if (guardUnsubscribe) guardUnsubscribe();
            if (adInterval) clearInterval(adInterval);
            currentSociety = "";
            document.getElementById("vehicleInput").value = "";
            document.getElementById("societyInput").value = "";
            document.getElementById("vehicle-search").style.display = "none";
            document.getElementById("society-verification").style.display = "block";
            loadGlobalAds(); // Make sure global ads load again on fallback screen
        });

        // Initialize Lifecycle
        window.addEventListener("DOMContentLoaded", () => {
            loadGlobalAds(); // Always load global ads first in the background
            const savedName = localStorage.getItem("savedSocietyName");
            const savedId = localStorage.getItem("savedSocietyId");
            if (savedName && savedId) {
                showSearchScreen(savedName, savedId);
            }

            // Auto-Refresh Logic (5 minutes)
            setTimeout(() => {
                window.location.reload();
            }, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
