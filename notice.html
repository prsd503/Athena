<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Owl Watcher | Notice Details</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 30px 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 100vw; margin: 0 5px; text-align: left; }
        h1 { text-align: center; margin-top: 0; }
        h3 { border-bottom: 2px solid #8d6e63; padding-bottom: 5px; }
        .notice-date { font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; margin-bottom: 15px; display: block; }
        .full-content { font-family: sans-serif; font-size: 1.1rem; line-height: 1.6; color: #2f3640; overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; white-space: pre-wrap; }
        .btn-container { text-align: center; margin-top: 30px; border-top: 1px solid #dcdde1; padding-top: 15px; }
        .back-btn { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; width: 85%; font-family: 'Caveat', cursive; text-decoration: none; display: inline-block; text-align: center; }
    </style>
</head>
<body>

    <div class="card" style="margin-top: 50px;">
        <h1>Owl Watcher 🦉</h1>
        <h3>📢 Full Notice</h3>
        <span id="notice-date" class="notice-date">Loading date...</span>
        <div id="notice-full-content" class="full-content">Loading content...</div>
        
        <div class="btn-container">
            <a href="index.html" class="back-btn">Back</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEYKHQpy_VjmgjYiWQOPjXth1bghYsf9M",
            authDomain: "finder-owl.firebaseapp.com",
            projectId: "finder-owl",
            storageBucket: "finder-owl.firebasestorage.app",
            messagingSenderId: "1011347100861",
            appId: "1:1011347100861:web:24246f9a4eb24d812cd3d4"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadFullNotice() {
            // Parse URL parameters to retrieve societyId
            const urlParams = new URLSearchParams(window.location.search);
            const societyId = urlParams.get('id');
            
            const contentDiv = document.getElementById('notice-full-content');
            const dateSpan = document.getElementById('notice-date');

            if (!societyId) {
                contentDiv.innerText = "Error: Invalid notice resource reference.";
                dateSpan.innerText = "";
                return;
            }

            try {
                const docRef = doc(db, "notices", societyId);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    const data = snap.data();
                    const todayStr = new Date().toLocaleDateString('en-CA'); 
                    
                    let displayMsg = data.todayMessage;
                    let storedDate = data.date || todayStr;

                    // Fallback to secondary slot if system date has moved ahead
                    if (storedDate < todayStr) {
                        displayMsg = data.tomorrowMessage || "No new notices.";
                        dateSpan.innerText = todayStr;
                    } else {
                        dateSpan.innerText = storedDate;
                    }

                    contentDiv.innerText = displayMsg || "No notices for today.";
                } else {
                    contentDiv.innerText = "Notice record could not be found.";
                    dateSpan.innerText = "";
                }
            } catch (error) {
                console.error("Error reading notice archive:", error);
                contentDiv.innerText = "An unexpected error occurred while fetching notice.";
            }
        }

        window.addEventListener("DOMContentLoaded", loadFullNotice);
    </script>
<!-- Paste this anywhere in your HTML file (preferably just before the closing </body> tag) -->

<div id="owl-container">
  <!-- Owl Icon Container -->
  <div id="owl-icon" onclick="activateOwlEffect()">
    🦉
  </div>
  <!-- Audio element playing theme.mp3 -->
  <audio id="owl-audio" src="theme.mp3" preload="auto"></audio>
</div>

<style>
  #owl-container {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
  }

  #owl-icon {
    font-size: 60px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
  }

  #owl-icon:hover {
    transform: scale(1.15);
  }

  /* Animation for Enlarging and Shrinking 2 Times */
  @keyframes enlargeAndShrinkTwice {
    0% { transform: scale(1); }
    25% { transform: scale(1.6); }
    50% { transform: scale(1); }
    75% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }

  .active-effect {
    animation: enlargeAndShrinkTwice 2s ease-in-out forwards;
  }
</style>

<script>
  function activateOwlEffect() {
    const container = document.getElementById('owl-container');
    const audio = document.getElementById('owl-audio');

    // Prevent spam clicking while animation is active
    if (container.classList.contains('active-effect')) return;

    // Play the theme audio
    audio.currentTime = 0;
    audio.play().catch(error => {
      console.log("Audio playback blocked or file not found:", error);
    });

    // Trigger the enlarge and shrink animation (lasts 2 seconds)
    container.classList.add('active-effect');

    // Reset after the animation finishes
    setTimeout(() => {
      container.classList.remove('active-effect');
    }, 2000);
  }
</script>
    
</body>
</html>
