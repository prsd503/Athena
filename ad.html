<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Owl Watcher | Post an Ad</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; margin-bottom: 25px; }
        input, select { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top: 10px; border: 2px solid #5d4037; }
        button:hover { background: #5d4037; }
        .contact-btn { display: inline-block; background: #8d6e63; color: white; padding: 10px 20px; text-decoration: none; border-radius: 10px; font-size: 1rem; margin-top: 15px; border: 2px solid #5d4037; }
        .contact-btn:hover { background: #5d4037; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Advertise with Us 🦉</h1>
        <p>Promote your services directly on our community screens!</p>
    </div>

    <div class="card">
        <h2>📍 Post a Local Society Ad</h2>
        <p style="font-size: 0.9rem; color: #7f8c8d; margin-top: 0;">Visible to residents within a specific selected community.</p>
        <input type="text" id="localSocietyName" placeholder="Target Society Name">
        <input type="text" id="localAdImgUrl" placeholder="Image URL (720x720 Square)">
        <button id="submitLocalAdBtn">Submit Local Ad</button>
    </div>

    <div class="card">
        <h2>🌍 Post a Global Ad</h2>
        <p style="font-size: 0.9rem; color: #7f8c8d; margin-top: 0;">Visible to everyone on the landing page before logging in.</p>
        <input type="text" id="globalAdImgUrl" placeholder="Image URL (720x720 Square)">
        <button id="submitGlobalAdBtn" style="background: #27ae60; border-color: #1e8449;">Submit Global Ad</button>
    </div>

    <a href="index.html" class="contact-btn">Back to Home</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEYKHQpy_VjmgjYiWQOPjXth1bghYsf9M",
            authDomain: "finder-owl.firebaseapp.com",
            projectId: "finder-owl",
            storageBucket: "finder-owl.firebasestorage.app",
            messagingSenderId: "1011347100861",
            appId: "1:1011347100861:web:24246f9a4eb24d812cd3d4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Utility to generate a random 6-character request ID
        function generateAdKey() {
            return "AD-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        }

        // Handler 1: Local Ad Submission
        document.getElementById("submitLocalAdBtn").addEventListener("click", async () => {
            const societyInput = document.getElementById("localSocietyName").value.trim();
            const imgUrl = document.getElementById("localAdImgUrl").value.trim();

            if (!societyInput || !imgUrl) {
                alert("Please enter target society name and a valid image URL.");
                return;
            }

            try {
                // Find matching society ID to associate
                const snap = await getDocs(collection(db, "societies"));
                const match = snap.docs.find(d => d.data().name?.toLowerCase() === societyInput.toLowerCase());
                
                if (!match) {
                    alert("We couldn't find a registered society with that name. Please check spelling.");
                    return;
                }

                const requestId = generateAdKey();
                await addDoc(collection(db, "ads"), {
                    requestId: requestId,
                    societyId: match.id,
                    societyName: match.data().name,
                    imageUrl: imgUrl,
                    type: "local",
                    societyApproved: false,
                    owlWatcherApproved: false,
                    timestamp: new Date()
                });

                alert(`Success! Local Ad Request created. Write down your Request Key: ${requestId}`);
                document.getElementById("localSocietyName").value = "";
                document.getElementById("localAdImgUrl").value = "";
            } catch (err) {
                console.error(err);
                alert("Error submitting local ad request.");
            }
        });

        // Handler 2: Global Ad Submission
        document.getElementById("submitGlobalAdBtn").addEventListener("click", async () => {
            const imgUrl = document.getElementById("globalAdImgUrl").value.trim();

            if (!imgUrl) {
                alert("Please enter a valid image URL.");
                return;
            }

            try {
                const requestId = generateAdKey();
                await addDoc(collection(db, "ads"), {
                    requestId: requestId,
                    societyId: "global",
                    societyName: "Platform-Wide",
                    imageUrl: imgUrl,
                    type: "global",
                    societyApproved: true, // Auto-approved by community side since it is platform wide
                    owlWatcherApproved: false, // Pending central admin check
                    timestamp: new Date()
                });

                alert(`Success! Global Ad Request created. Write down your Request Key: ${requestId}`);
                document.getElementById("globalAdImgUrl").value = "";
            } catch (err) {
                console.error(err);
                alert("Error submitting global ad request.");
            }
        });
    </script>
</body>
</html>
