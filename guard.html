<head>

    <!-- Firebase SDKs (Compat scripts for dynamic contact fetching) -->

    <style>
        /* Base Theme */
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; margin: 0; }
        
        /* Professional Navigation */
        .main-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: #fdf6e3;
            border-bottom: 2px solid #8d6e63;
            margin-bottom: 20px;
            position: relative;
        }
        .nav-logo {
            font-family: 'Caveat', cursive;
            color: #5d4037;
            font-size: 1.5rem;
            font-weight: bold;
            margin-right: 20px;
        }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: #5d4037; font-weight: bold; }
        
        /* Mobile Menu Button Styling */
        .menu-btn { 
            display: none; 
            background: #8d6e63; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-family: 'Caveat', cursive; 
            font-size: 1.1rem; 
        }

        /* Responsive Mobile View */
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 70px; 
                width: 100%; 
                background: #fdf6e3; 
                padding: 20px; 
                z-index: 999;
            }
            .nav-links.active { display: flex; }
        }

        /* Card & UI Components */
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 100vw; margin: 0 auto 20px auto; }
        input, select { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        #portalSection { display: none; }
    </style>
</head>
<body>

    <!-- Professional Navigation -->
    <nav class="main-nav">
        <div class="nav-logo">Owl Watcher 🦉</div>
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="admin.html">Admin Portal</a>
            <a href="guard.html" style="background-color: yellow;">Security Guard Portal</a>
            <a href="studio.html">Photo Studio Portal</a>
            <a id="dynamicContactLink" href="https://wa.me/919033406816" target="_blank">Contact Us</a>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="card" id="login-section">
         <h2>Security Guard Login</h2>
       <style>
  .flying-owl-btn {
    background: none;
    border: none;
    font-size: 2.5rem;
    cursor: pointer;
    padding: 10px;
    outline: none;
    display: inline-block;
    perspective: 1000px;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
  }
  
  .flying-owl-btn:active {
    transform: scale(0.9);
  }

  @keyframes flyAway3D {
    0% {
      transform: translate3d(0, 0, 0) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      opacity: 1;
    }
    20% {
      transform: translate3d(-20px, -30px, 100px) scale3d(1.2, 1.2, 1.2) rotateX(15deg) rotateY(-20deg) rotateZ(-10deg);
    }
    50% {
      transform: translate3d(80px, -150px, 300px) scale3d(0.8, 0.8, 0.8) rotateX(-25deg) rotateY(45deg) rotateZ(-20deg);
    }
    100% {
      transform: translate3d(300px, -500px, 800px) scale3d(0.1, 0.1, 0.1) rotateX(-45deg) rotateY(90deg) rotateZ(-45deg);
      opacity: 0;
    }
  }

  .flying-owl-btn.flying {
    animation: flyAway3D 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
</style>

<button class="flying-owl-btn" id="flyingOwlBtn" onclick="triggerOwlFlight()" title="Click to watch the 3D owl fly!">
  🦉
</button>

<audio id="owlAudioTheme" src="theme.mp3" preload="auto"></audio>

<script>
  function triggerOwlFlight() {
    const btn = document.getElementById('flyingOwlBtn');
    const audio = document.getElementById('owlAudioTheme');

    // Play theme.mp3 audio
    if (audio) {
      audio.currentTime = 0;
      audio.play().catch(e => console.log("Audio play blocked or missing file:", e));
    }

    // Trigger 3D flying animation if not already flying
    if (!btn.classList.contains('flying')) {
      btn.classList.add('flying');

      // Reset button position and opacity after the animation completes (1.5s)
      setTimeout(() => {
        btn.classList.remove('flying');
      }, 1500);
    }
  }
</script>
        
        
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <br>
        <button id="loginBtn">Login</button>
        <br>
    </div>
        
    <!-- Portal Section -->
    <div id="portalSection">
        <div class="card">
            <h2>Start Your Shift</h2>
            <select id="guardSelect"><option>Loading...</option></select>
            <button id="activateBtn">Set Me Active</button>
        </div>
        
        <!-- Custom Modal Window -->
        <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
            <div style="background:#fff; padding:20px; border-radius:15px; text-align:center; border:2px solid #8d6e63;">
                <p id="modalMessage"></p>
                <button id="closeModalBtn">OK</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Vehicle Lookup</h2>
            <input type="text" id="vSearch" placeholder="Vehicle Number">
            <button id="searchBtn">Search Owner</button>
            <div id="result"></div>
        </div>
        <button id="logoutBtn" style="background:#d32f2f;">Logout</button>
    </div>

    <!-- Script Handling -->
    <script>
        // --- Firebase Dynamic Contact Integration ---
        const firebaseConfig = {
          apiKey: "YOUR_FIREBASE_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Fetch dynamic contact target from Firestore
        async function loadDynamicContact() {
          try {
            const docRef = await db.collection("settings").doc("contact").get();
            if (docRef.exists) {
              const data = docRef.data();
              const contactLink = data.url || data.whatsapp || data.link;
              if (contactLink) {
                const contactAnchor = document.getElementById('dynamicContactLink');
                if (contactAnchor) {
                  contactAnchor.href = contactLink;
                }
              }
            }
          } catch (err) {
            console.warn("Could not load dynamic contact from Firestore, using default fallback link.", err);
          }
        }

        window.addEventListener('load', () => {
            loadDynamicContact();
        });

        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
    <script type="module" src="app.js"></script>
    <script type="module" src="guard-logic.js"></script>
</body>
</html>
