<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Security Guard Portal | Owl Watcher</title>
    <style>
        /* Base Theme */
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; margin: 0; }
        
        /* Professional Navigation */
        .main-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: #fdf6e3;
            border-bottom: 2px solid #8d6e63;
            margin-bottom: 20px;
            position: relative;
        }
        .nav-logo {
            font-family: 'Caveat', cursive;
            color: #5d4037;
            font-size: 1.5rem;
            font-weight: bold;
            margin-right: 20px;
        }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: #5d4037; font-weight: bold; }
        
        /* Mobile Menu Button Styling */
        .menu-btn { 
            display: none; 
            background: #8d6e63; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-family: 'Caveat', cursive; 
            font-size: 1.1rem; 
        }

        /* Responsive Mobile View */
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .nav-links { 
                display: none; 
                flex-direction: column; 
                position: absolute; 
                top: 70px; 
                width: 100%; 
                background: #fdf6e3; 
                padding: 20px; 
                z-index: 999;
            }
            .nav-links.active { display: flex; }
        }

        /* Card & UI Components */
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 100vw; margin: 0 auto 20px auto; }
        input, select { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        #portalSection { display: none; }
    </style>
</head>
<body>

    <!-- Professional Navigation -->
    <nav class="main-nav">
        <div class="nav-logo">Owl Watcher 🦉</div>
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="admin.html">Admin Portal</a>
            <a href="guard.html">Security Guard Portal</a>
            <a href="studio.html">Photo Studio Portal</a>
            <a href="https://wa.me/919033406816">Contact Us</a>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="card" id="login-section">
         <h2>Security Guard Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <br>
        <button id="loginBtn">Login</button>
        <br>
        </div>
        
    <!-- Portal Section -->
    <div id="portalSection">
        <div class="card">
            <h2>Start Your Shift</h2>
            <select id="guardSelect"><option>Loading...</option></select>
            <button id="activateBtn">Set Me Active</button>
        </div>
<!-- You must have this in your guard.html for showModal() to work -->
<div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#fff; padding:20px; border-radius:15px; text-align:center; border:2px solid #8d6e63;">
        <p id="modalMessage"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>
        
        
        <div class="card">
            <h2>Vehicle Lookup</h2>
            <input type="text" id="vSearch" placeholder="Vehicle Number">
            <button id="searchBtn">Search Owner</button>
            <div id="result"></div>
        </div>
        <button id="logoutBtn" style="background:#d32f2f;">Logout</button>
    </div>

    <!-- Script Handling -->
    <script>
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
    <script type="module" src="app.js"></script>
    <script type="module" src="guard-logic.js"></script>
</body>
</html>
