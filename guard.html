<!-- Script Handling (Dynamic Contact & UI helper setups) -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBEYKHQpy_VjmgjYiWQOPjXth1bghYsf9M",
          authDomain: "finder-owl.firebaseapp.com",
          projectId: "finder-owl",
          storageBucket: "finder-owl.firebasestorage.app",
          messagingSenderId: "1011347100861",
          appId: "1:1011347100861:web:24246f9a4eb24d812cd3d4"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Modal Helpers available globally for guard-logic.js too
        window.closeModal = () => { 
            const modal = document.getElementById('customModal');
            if (modal) modal.style.display = 'none'; 
        };

        window.showModal = (msg) => {
            const msgEl = document.getElementById('modalMessage');
            const modal = document.getElementById('customModal');
            if (msgEl && modal) {
                msgEl.innerText = msg;
                modal.style.display = 'flex';
            }
        };

        // Forgot Password Implementation
        document.getElementById('forgotPasswordBtn').addEventListener('click', async () => {
            const emailInput = document.getElementById('email');
            const email = emailInput ? emailInput.value.trim() : "";

            if (!email) {
                showModal("Please enter your email address first.");
                return;
            }

            try {
                let guardExists = false;

                // 1. Try fetching directly if document ID is the email
                const docRef = await db.collection("guards").doc(email).get();
                if (docRef.exists) {
                    guardExists = true;
                } else {
                    // 2. Fallback: Query where 'email' field matches
                    const querySnap = await db.collection("guards").where("email", "==", email).get();
                    if (!querySnap.empty) {
                        guardExists = true;
                    }
                }
                
                if (!guardExists) {
                    showModal("Email not registered");
                    return;
                }

                // Trigger Firebase password reset email if guard exists
                await auth.sendPasswordResetEmail(email);
                showModal("Password reset link sent to your email!");
            } catch (error) {
                console.error("Error sending password reset email:", error);
                showModal("Error: " + error.message);
            }
        });

        // Fetch dynamic contact target from Firestore
        async function loadDynamicContact() {
          try {
            const docRef = await db.collection("settings").doc("contact").get();
            if (docRef.exists) {
              const data = docRef.data();
              const contactLink = data.url || data.whatsapp || data.link;
              if (contactLink) {
                const contactAnchor = document.getElementById('dynamicContactLink');
                if (contactAnchor) {
                  contactAnchor.href = contactLink;
                }
              }
            }
          } catch (err) {
            console.warn("Could not load dynamic contact from Firestore, using default fallback link.", err);
          }
        }

        window.addEventListener('load', () => {
            loadDynamicContact();
        });

        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
