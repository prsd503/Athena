
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title> Security Guard Portal | Owl Watcher</title>
   
    <style>
.main-nav {
    display: flex;
    justify-content: center; /* Centers everything */
    align-items: center;
    position: relative;
    padding: 15px 20px;
}

.nav-logo {
    position: absolute;
    left: 20px; /* Keeps the logo on the left */
}

.nav-links {
    display: flex;
    justify-content: center; /* Centers the actual links */
    gap: 20px;
}
        
/* Ensure the hamburger button is visible and styled */
.hamburger { 
    display: none; 
    background: none; 
    border: none; 
    font-size: 28px; 
    cursor: pointer; 
    color: #000; /* Sets lines to black */
    z-index: 1001; /* Keeps it above other elements */
}

@media (max-width: 768px) {
    .hamburger { display: block; }
    
    .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: #fdf6e3; /* Match your background */
        flex-direction: column;
        padding: 20px;
        border-bottom: 2px solid #8d6e63;
        z-index: 999; /* Higher than content, lower than button */
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Adds separation */
    }
    
    .nav-links.active { display: flex; }
}

        .nav-links {
    display: flex;
    flex-wrap: nowrap; /* Ensures they stay on one line */
    white-space: nowrap;
}
        
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 100vw; margin: 0px 5px; margin-bottom: 20px; }
        input, select { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; }
        button, .contact-btn, .primary-btn { text-decoration: none; background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        #portalSection { display: none; }
        #result { margin-top: 15px; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div class="card">
        
         <nav class="main-nav">
            <h1 style="display:inline-block; float: left; margin-right: 23px;">Owl Watcher 🦉<p>Security Guard Portal</p></h1>
<button class="menu-btn" id="menuToggle">☰</button>
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="admin.html">Admin Portal</a>
        <a style="backgroud:#000; color:#fff" href="guard.html">Security Guard Portal</a>
        <a href="studio.html">Photo Studio Portal</a>
        <a href="https://wa.me/919033406816">Contact Us</a>
    </div>
</nav>

    <div class="card" id="login-section">
        <input type="email" id="email" placeholder="Email"><input type="password" id="pass" placeholder="Password">
        <br>
        <button id="loginBtn">Login</button>
        <br>
       <hr style="border: 0; border-top: 1px solid #dcdde1; margin: 20px 0;">
        <a href="admin.html" class="contact-btn" target="_self">Admin Portal</a>
        <a href="index.html" class="contact-btn" target="_self">Back to HOME</a>
    </div>
        
    <div id="portalSection">
        <div class="card">
            <h2>Start Your Shift</h2>
            <select id="guardSelect"><option>Loading...</option></select>
            <button id="activateBtn">Set Me Active</button>
        </div>
        <div class="card">
            <h2>Vehicle Lookup</h2>
            <input type="text" id="vSearch" placeholder="Vehicle Number">
            <button id="searchBtn">Search Owner</button>
            <div id="result"></div>
        </div>
         <button style="display:none;" id="logoutBtn" style="background:#d32f2f;">Logout</button>
    </div>
    <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; margin:15% auto; padding:20px; width:80%; max-width:300px; border-radius:10px; text-align:center;">
        <p id="modalMessage"></p>
        <button onclick="closeModal()">Close</button>
    </div>
    </div>
    
    <script type="module" src="app.js">
document.getElementById('menuToggle').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('active');
});
        
    </script>

<script type="module" src="guard-logic.js"></script>

</body>
</html>
