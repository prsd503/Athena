        <style>
  .owl-flight-wrapper {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }

  /* Custom SVG Owl Container designed for wing flapping animation */
  .owl-svg-container {
    width: 80px;
    height: 80px;
    display: inline-block;
    transform-origin: center center;
  }

  @keyframes wingFlap {
    0%, 100% { transform: scaleX(1) translateY(0); }
    50% { transform: scaleX(0.7) translateY(-3px); }
  }

  @keyframes realFlightPath {
    0% {
      transform: translate3d(0, 0, 0) scale(1) rotate(0deg);
      opacity: 1;
    }
    20% {
      transform: translate3d(-30px, -50px, 50px) scale(1.1) rotate(-8deg);
    }
    50% {
      transform: translate3d(80px, -180px, 150px) scale(0.9) rotate(12deg);
    }
    80% {
      transform: translate3d(-40px, -350px, 300px) scale(0.5) rotate(-15deg);
    }
    100% {
      transform: translate3d(150px, -550px, 500px) scale(0.15) rotate(-30deg);
      opacity: 0;
    }
  }

  .owl-svg-container.flapping {
    animation: wingFlap 0.25s infinite ease-in-out, realFlightPath 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
</style>

<div class="owl-flight-wrapper" onclick="triggerRealisticOwlFlight()" title="Click to launch real owl flying!">
  <div class="owl-svg-container" id="owlContainer">
    <!-- Detailed SVG Owl Graphic with distinct body and wings for realistic motion scaling -->
    <svg viewBox="0 0 100 100" width="100%" height="100%">
      <!-- Body & Head -->
      <ellipse cx="50" cy="55" rx="22" ry="26" fill="#8B4513" />
      <circle cx="50" cy="35" r="18" fill="#A0522D" />
      
      <!-- Big Owl Eyes -->
      <circle cx="42" cy="33" r="7" fill="#FFF" />
      <circle cx="58" cy="33" r="7" fill="#FFF" />
      <circle cx="43" cy="33" r="3" fill="#000" />
      <circle cx="57" cy="33" r="3" fill="#000" />
      
      <!-- Beak -->
      <polygon points="50,37 46,43 54,43" fill="#FFA500" />

      <!-- Left Wing -->
      <path id="leftWing" d="M28 45 Q 15 55 25 75 Q 35 65 32 50 Z" fill="#654321" />
      
      <!-- Right Wing -->
      <path id="rightWing" d="M72 45 Q 85 55 75 75 Q 65 65 68 50 Z" fill="#654321" />

      <!-- Tail feathers -->
      <path d="M42 75 L50 88 L58 75 Z" fill="#654321" />
    </svg>
  </div>
</div>

<audio id="owlAudioTheme" src="theme.mp3" preload="auto"></audio>

<script>
  function triggerRealisticOwlFlight() {
    const container = document.getElementById('owlContainer');
    const audio = document.getElementById('owlAudioTheme');

    // Play theme.mp3 audio
    if (audio) {
      audio.currentTime = 0;
      audio.play().catch(e => console.log("Audio play blocked or missing file:", e));
    }

    // Trigger vector wing-flap and 3D soaring flight animation
    if (!container.classList.contains('flapping')) {
      container.classList.add('flapping');

      // Reset after animation finishes (2.2 seconds)
      setTimeout(() => {
        container.classList.remove('flapping');
      }, 2200);
    }
  }
</script>

    <!-- Script Handling -->
    <script>
        // --- Firebase Dynamic Contact Integration ---
        const firebaseConfig = {
          apiKey: "YOUR_FIREBASE_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Fetch dynamic contact target from Firestore
        async function loadDynamicContact() {
          try {
            const docRef = await db.collection("settings").doc("contact").get();
            if (docRef.exists) {
              const data = docRef.data();
              const contactLink = data.url || data.whatsapp || data.link;
              if (contactLink) {
                const contactAnchor = document.getElementById('dynamicContactLink');
                if (contactAnchor) {
                  contactAnchor.href = contactLink;
                }
              }
            }
          } catch (err) {
            console.warn("Could not load dynamic contact from Firestore, using default fallback link.", err);
          }
        }

        window.addEventListener('load', () => {
            loadDynamicContact();
        });

        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
    <script type="module" src="app.js"></script>
    <script type="module" src="guard-logic.js"></script>
