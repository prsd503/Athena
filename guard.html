<style>
  #flying-owl-container {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
  }

  #owl-icon {
    position: relative;
    font-size: 60px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
  }

  #owl-icon:hover {
    transform: scale(1.15);
  }

  /* Glowing and Blinking Eyes Styling */
  .owl-eyes {
    position: absolute;
    top: 22px; /* Adjust based on emoji alignment */
    left: 17px;
    width: 26px;
    height: 10px;
    background: radial-gradient(circle, #ffff00 0%, #ff8800 100%);
    box-shadow: 0 0 10px #ffea00, 0 0 20px #ff4500;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes eyeBlink {
    0%, 100% { opacity: 1; transform: scaleY(1); }
    20% { opacity: 0.2; transform: scaleY(0.1); }
    40% { opacity: 1; transform: scaleY(1); }
    60% { opacity: 0.2; transform: scaleY(0.1); }
    80% { opacity: 1; transform: scaleY(1); }
  }

  /* Main Flying & Enlarging Animation */
  @keyframes flyAcross {
    0% {
      transform: translate(0, 0) scale(1.5) rotate(0deg);
      opacity: 1;
    }
    50% {
      transform: translate(-45vw, -40vh) scale(3) rotate(-10deg);
      opacity: 0.95;
    }
    100% {
      transform: translate(-90vw, -80vh) scale(0.8) rotate(-25deg);
      opacity: 0;
    }
  }

  .fly-animation {
    animation: flyAcross 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }

  .fly-animation .owl-eyes {
    animation: eyeBlink 2.5s ease-in-out forwards;
  }
</style>

<script>
  function activateOwlFly() {
    const container = document.getElementById('flying-owl-container');
    const audio = document.getElementById('owl-audio');

    // Prevent spam clicking while animation is active
    if (container.classList.contains('fly-animation')) return;

    // Play the theme audio
    audio.currentTime = 0;
    audio.play().catch(error => {
      console.log("Audio playback blocked or file not found:", error);
    });

    // Trigger the flight, enlargement, and eye-blinking animation
    container.classList.add('fly-animation');

    // Reset after the animation finishes (2.5 seconds)
    setTimeout(() => {
      container.classList.remove('fly-animation');
    }, 2500);
  }
</script>

    <script>
        // --- Firebase Dynamic Contact Integration ---
        const firebaseConfig = {
          apiKey: "YOUR_FIREBASE_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Fetch dynamic contact target from Firestore
        async function loadDynamicContact() {
          try {
            const docRef = await db.collection("settings").doc("contact").get();
            if (docRef.exists) {
              const data = docRef.data();
              const contactLink = data.url || data.whatsapp || data.link;
              if (contactLink) {
                const contactAnchor = document.getElementById('dynamicContactLink');
                if (contactAnchor) {
                  contactAnchor.href = contactLink;
                }
              }
            }
          } catch (err) {
            console.warn("Could not load dynamic contact from Firestore, using default fallback link.", err);
          }
        }

        window.addEventListener('load', () => {
            loadDynamicContact();
        });

        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
