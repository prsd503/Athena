       <div style="text-align: center; padding: 20px;">
  <canvas id="owlCanvas" width="300" height="300" style="cursor: pointer; background: transparent;" onclick="triggerCanvasOwlFlight()" title="Click to launch real flying owl!"></canvas>
</div>

<audio id="owlAudioTheme" src="theme.mp3" preload="auto"></audio>

<script>
  const canvas = document.getElementById('owlCanvas');
  const ctx = canvas.getContext('2d');

  // Owl flight animation state variables
  let isFlying = false;
  let flightProgress = 0; // 0 to 1
  let animId = null;

  // Draw initial resting real-looking vibrant owl
  function drawOwl(x, y, scale = 1, wingAngle = 0, opacity = 1) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    // --- Vibrant Feathers & Body Back Layer ---
    // Body gradient (Golden brown, warm amber, and vibrant teal/turquoise chest highlights)
    let bodyGrad = ctx.createRadialGradient(0, 10, 5, 0, 10, 45);
    bodyGrad.addColorStop(0, '#FFD700'); // Vibrant gold center
    bodyGrad.addColorStop(0.4, '#D2691E'); // Rich chocolate brown
    bodyGrad.addColorStop(1, '#1E3A8A'); // Deep midnight blue tint
    
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 15, 30, 42, 0, 0, Math.PI * 2);
    ctx.fill();

    // Vibrant chest pattern feathers (Teal & Orange accents)
    ctx.fillStyle = '#0D9488'; // Vibrant teal
    for(let i = -15; i <= 15; i += 10) {
      ctx.beginPath();
      ctx.arc(i, 20, 5, 0, Math.PI);
      ctx.fill();
    }
    ctx.fillStyle = '#F59E0B'; // Bright amber
    for(let i = -10; i <= 10; i += 10) {
      ctx.beginPath();
      ctx.arc(i, 30, 4, 0, Math.PI);
      ctx.fill();
    }

    // --- Wings (Movable for flapping animation) ---
    ctx.save();
    // Left Wing
    ctx.translate(-22, -5);
    ctx.rotate(wingAngle);
    let leftWingGrad = ctx.createLinearGradient(-30, 0, 0, 50);
    leftWingGrad.addColorStop(0, '#B45309');
    leftWingGrad.addColorStop(0.5, '#451A03');
    leftWingGrad.addColorStop(1, '#0F766E'); // Teal feather tips
    ctx.fillStyle = leftWingGrad;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-35, 10, -45, 45, -15, 60);
    ctx.bezierCurveTo(-5, 50, 0, 20, 0, 0);
    ctx.fill();
    ctx.restore();

    ctx.save();
    // Right Wing
    ctx.translate(22, -5);
    ctx.rotate(-wingAngle);
    let rightWingGrad = ctx.createLinearGradient(30, 0, 0, 50);
    rightWingGrad.addColorStop(0, '#B45309');
    rightWingGrad.addColorStop(0.5, '#451A03');
    rightWingGrad.addColorStop(1, '#0F766E');
    ctx.fillStyle = rightWingGrad;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(35, 10, 45, 45, 15, 60);
    ctx.bezierCurveTo(5, 50, 0, 20, 0, 0);
    ctx.fill();
    ctx.restore();

    // --- Head & Facial Disc ---
    let headGrad = ctx.createRadialGradient(0, -25, 2, 0, -25, 28);
    headGrad.addColorStop(0, '#FBBF24');
    headGrad.addColorStop(0.7, '#B45309');
    headGrad.addColorStop(1, '#78350F');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(0, -25, 26, 0, Math.PI * 2);
    ctx.fill();

    // Ear Tufts (Horn-like feathers)
    ctx.fillStyle = '#78350F';
    ctx.beginPath();
    ctx.moveTo(-18, -45); ctx.lineTo(-28, -60); ctx.lineTo(-10, -48); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(18, -45); ctx.lineTo(28, -60); ctx.lineTo(10, -48); ctx.fill();

    // Big Piercing Owl Eyes (Outer rings)
    ctx.fillStyle = '#065F46'; // Deep emerald green ring
    ctx.beginPath(); ctx.arc(-11, -27, 11, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(11, -27, 11, 0, Math.PI * 2); ctx.fill();

    // Eye Whites / Gold Iris
    ctx.fillStyle = '#F59E0B';
    ctx.beginPath(); ctx.arc(-11, -27, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(11, -27, 8, 0, Math.PI * 2); ctx.fill();

    // Pupils (Black)
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.arc(-11, -27, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(11, -27, 4, 0, Math.PI * 2); ctx.fill();

    // Eye highlights (Lifelike sparkle)
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath(); ctx.arc(-13, -29, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(9, -29, 1.5, 0, Math.PI * 2); ctx.fill();

    // Sharp Curved Beak
    ctx.fillStyle = '#D97706';
    ctx.beginPath();
    ctx.moveTo(0, -32);
    ctx.lineTo(-4, -20);
    ctx.lineTo(0, -14);
    ctx.lineTo(4, -20);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#B45309';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(-3, -19);
    ctx.lineTo(3, -19);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  // Initial draw render
  function renderStaticOwl() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawOwl(150, 160, 1, 0, 1);
  }
  renderStaticOwl();

  // Trigger flight sequence
  function triggerCanvasOwlFlight() {
    if (isFlying) return;
    isFlying = true;
    flightProgress = 0;

    const audio = document.getElementById('owlAudioTheme');
    if (audio) {
      audio.currentTime = 0;
      audio.play().catch(e => console.log("Audio play error:", e));
    }

    const startTime = performance.now();
    const duration = 2000; // 2 seconds flight duration

    function animate(currentTime) {
      const elapsed = currentTime - startTime;
      flightProgress = Math.min(elapsed / duration, 1);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Calculate smooth trajectory (Fly up and away to the top right with 3D scaling down)
      let startX = 150, startY = 160;
      let targetX = 260, targetY = -50;
      
      let currentX = startX + (targetX - startX) * flightProgress;
      let currentY = startY + (targetY - startY) * flightProgress - Math.sin(flightProgress * Math.PI) * 40; // slight arc
      let currentScale = 1 - (flightProgress * 0.75); // scales down into distance
      let currentOpacity = 1 - flightProgress;

      // Realistic flapping wing calculation based on sine wave
      let flapSpeed = 25; // frequency of wing beats
      let wingAngle = Math.sin(flightProgress * flapSpeed) * 0.65; // radians rotation

      drawOwl(currentX, currentY, Math.max(currentScale, 0.25), wingAngle, Math.max(currentOpacity, 0));

      if (flightProgress < 1) {
        animId = requestAnimationFrame(animate);
      } else {
        isFlying = false;
        setTimeout(renderStaticOwl, 300); // Reset back to initial resting post
      }
    }

    animId = requestAnimationFrame(animate);
  }
</script>

    <!-- Script Handling -->
    <script>
        // --- Firebase Dynamic Contact Integration ---
        const firebaseConfig = {
          apiKey: "YOUR_FIREBASE_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Fetch dynamic contact target from Firestore
        async function loadDynamicContact() {
          try {
            const docRef = await db.collection("settings").doc("contact").get();
            if (docRef.exists) {
              const data = docRef.data();
              const contactLink = data.url || data.whatsapp || data.link;
              if (contactLink) {
                const contactAnchor = document.getElementById('dynamicContactLink');
                if (contactAnchor) {
                  contactAnchor.href = contactLink;
                }
              }
            }
          } catch (err) {
            console.warn("Could not load dynamic contact from Firestore, using default fallback link.", err);
          }
        }

        window.addEventListener('load', () => {
            loadDynamicContact();
        });

        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });
    </script>
    <script type="module" src="app.js"></script>
