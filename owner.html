<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finder Owl - Owner</title>
    <!-- Importing your specific font -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; }
        h1 { color: #5d4037; font-size: 2.5rem; }
        /* Matching your search bar style */
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top: 10px; }
        .message-card { border: 2px solid #8d6e63; padding: 10px; margin: 10px 0; border-radius: 10px; background: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h1>Owner Portal 🦉</h1>
    
    <input type="number" id="vehicleCount" placeholder="How many vehicles?" min="1">
    <button onclick="generateFields()">Generate Fields</button>
    
    <div id="vehicleFields" style="margin-top:20px;"></div>
    <button id="saveBtn" style="display:none;">Save All</button>

    <hr style="border: 1px solid #8d6e63; margin: 20px 0;">
    <h3>My Inbox</h3>
    <div id="inbox"></div>
</div>

<script>
    window.generateFields = () => {
        const count = document.getElementById("vehicleCount").value;
        const container = document.getElementById("vehicleFields");
        container.innerHTML = ""; // Clear previous

        if (count > 0) {
            for (let i = 0; i < count; i++) {
                // Creating the inputs with the same style class
                container.innerHTML += `<input type="text" class="v-num" placeholder="Vehicle ${i+1} Number"><br>`;
            }
            document.getElementById("saveBtn").style.display = "inline-block";
        }
    };
</script>

</body>
</html>
