<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Finder Owl | Owner Portal</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; }
        h1 { color: #5d4037; font-size: 2.5rem; margin-bottom: 10px; }
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Finder Owl 🦉</h1>
    <h3>Owner Portal</h3>
    
    <input type="number" id="vehicleCount" placeholder="Number of vehicles" min="1" max="10">
    <button type="button" onclick="window.generateFields()">Generate Fields</button>
    
    <div id="vehicleFields" style="margin-top:20px;"></div>
    <button id="saveBtn" style="display:none;">Save All Vehicles</button>
</div>

<script>
    // Define the function globally so the button can access it
    window.generateFields = function() {
        const count = parseInt(document.getElementById("vehicleCount").value);
        const container = document.getElementById("vehicleFields");
        
        // Clear previous entries
        container.innerHTML = "";
        
        if (count > 0 && count <= 10) {
            for (let i = 0; i < count; i++) {
                // Using template literal to inject input fields
                container.innerHTML += `
                    <input type="text" class="v-num" placeholder="Vehicle ${i+1} Number">
                    <br>
                `;
            }
            document.getElementById("saveBtn").style.display = "inline-block";
        } else {
            alert("Please enter a valid number (1-10)");
        }
    };
</script>

</body>
</html>
