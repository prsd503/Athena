<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facility Booking</title>
    <!-- Include your existing CSS and FullCalendar libraries here -->
</head>
<body>
    <h1 id="societyHeader">Loading...</h1>
    <div id="calendar"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ... Your firebaseConfig ...
        const db = getFirestore(initializeApp(firebaseConfig));

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Extract society ID from URL (e.g., facility.html?society=xyz)
            const urlParams = new URLSearchParams(window.location.search);
            const societyId = urlParams.get('society');

            if (!societyId) {
                document.getElementById('societyHeader').innerText = "Society not specified.";
                return;
            }

            try {
                // 2. Fetch Society Display Name for Header
                const societyDoc = await getDoc(doc(db, "societies", societyId));
                if (societyDoc.exists()) {
                    document.getElementById('societyHeader').innerText = `${societyDoc.data().name} Facility Calendar`;
                }

                // 3. Fetch Bookings dynamically for this society only
                const q = query(collection(db, "bookings"), where("society", "==", societyId));
                const snapshot = await getDocs(q);
                
                const events = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    events.push({
                        title: data.facilityId,
                        start: data.start,
                        end: data.end
                    });
                });

                // 4. Initialize your Calendar with 'events'
                // example: calendar.addEventSource(events);
                console.log("Loaded bookings for:", societyId, events);

            } catch (error) {
                console.error("Error loading data:", error);
            }
        });
    </script>
</body>
</html>
