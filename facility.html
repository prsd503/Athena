<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Watcher - Facility Calendar</title>
    <!-- Import Caveat Font for Branding -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <!--<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />-->
    <style>
        /* Brown Theme Palette (Preserved) */
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 20px; color: #5d4037; }
        
        .brown-theme { 
            background-color: #efebe9; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #8d6e63; 
            max-width: 400px; 
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(141, 110, 99, 0.2);
        }
        
        #calendar { background: white; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        
        .brand-header { font-family: 'Caveat', cursive; text-align: center; color: #5d4037; font-size: 32px; margin-bottom: 5px; }
        h1 { text-align: center; font-size: 22px; color: #3e2723; margin-top: 0; }
        
        #eventDetails { 
            background: #ffffff; padding: 15px; border-radius: 12px; margin-bottom: 20px; 
            border: 1px solid #d7ccc8; text-align: center; display: none; color: #5d4037;
        }
        
        .fc .fc-toolbar-title { font-size: 1.2rem !important; color: #3e2723; }
        .fc-event-title, .fc-event-time { display: none !important; }
        .fc-event { 
            border-radius: 50% !important; 
            width: 10px !important; 
            height: 10px !important; 
            margin: 0 auto !important; 
            background-color: #8d6e63 !important; 
            border: none !important; 
        }
    </style>
</head>
<body>

<div class="brown-theme">
    <div class="brand-header">Owl Watcher 🦉</div>
    <h1 id="societyHeader">Loading Calendar...</h1>
    
    <div id="eventDetails">
        <strong>Facility:</strong> <span id="dispFacility"></span><br>
        <strong>Time:</strong> <span id="dispTime"></span>
    </div>

    <div id='calendar'></div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script type="module">
    import { db } from "./app.js"; 
    import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Extract society ID from URL (e.g., facility.html?society=xyz)
        const urlParams = new URLSearchParams(window.location.search);
        const societyId = urlParams.get('society');

        if (!societyId) {
            document.getElementById('societyHeader').innerText = "Society not found";
            return;
        }

        const calendarEl = document.getElementById('calendar');
        const detailsBox = document.getElementById('eventDetails');
        
        // 2. Fetch Society Info & Facilities dynamically
        const facilityMap = {};
        try {
            // Get Display Name
            const socDoc = await getDoc(doc(db, "societies", societyId));
            if (socDoc.exists()) {
                document.getElementById('societyHeader').innerText = `${socDoc.data().name} Facility Calendar`;
            }

            // Get Facilities for THIS specific society
            const facDocRef = doc(db, "facilities", societyId);
            const facDocSnap = await getDoc(facDocRef);
            if (facDocSnap.exists()) {
                Object.assign(facilityMap, facDocSnap.data());
            }
        } catch (e) { console.error("Error fetching data:", e); }

        // 3. Initialize Calendar
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,today,next', center: 'title', right: '' },
            dateClick: function(info) {
                const dayBookings = calendar.getEvents().filter(e => e.startStr.split('T')[0] === info.dateStr);
                
                if (dayBookings.length > 0) {
                    const event = dayBookings[0];
                    document.getElementById('dispFacility').innerText = facilityMap[event.title] || event.title;
                    document.getElementById('dispTime').innerText = 
                        `${formatTime(event.start)} - ${formatTime(event.end)}`;
                    detailsBox.style.display = 'block';
                } else {
                    detailsBox.style.display = 'none';
                }
            }
        });
        calendar.render();

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
        }

        // 4. Fetch bookings filtered by the dynamic societyId
        try {
            const q = query(collection(db, "bookings"), where("society", "==", societyId));
            const snapshot = await getDocs(q);
            snapshot.forEach(doc => {
                const data = doc.data();
                calendar.addEvent({ 
                    id: doc.id, 
                    title: data.facilityId, 
                    start: data.start, 
                    end: data.end 
                });
            });
        } catch (error) { console.error("Error loading bookings:", error); }
    });
</script>
</body>
</html>
