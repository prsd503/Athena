<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Watcher - Facility Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 20px; color: #5d4037; }
        .brown-theme { background-color: #efebe9; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 15px rgba(141, 110, 99, 0.2); }
        #calendar { background: white; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .brand-header { font-family: 'Caveat', cursive; text-align: center; color: #5d4037; font-size: 32px; margin-bottom: 5px; }
        h1 { text-align: center; font-size: 20px; color: #3e2723; margin-top: 0; }
        #eventDetails { background: #ffffff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #d7ccc8; text-align: center; display: none; color: #5d4037; }
        .fc .fc-toolbar-title { font-size: 1.2rem !important; color: #3e2723; }
        
        /* Hide default FullCalendar event blocks/dots completely */
        .fc-event { display: none !important; }

        /* Booking Count Badge Styling */
        .booking-count-badge {
            background-color: #8d6e63;
            color: white;
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 0.75rem;
            margin-top: 4px;
            cursor: pointer;
            display: inline-block;
            font-weight: bold;
        }

        .back-btn { background: #8d6e63; color: white; border: none; padding: 8px 20px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-family: 'Caveat', cursive; text-decoration: none; display: inline-block; }
        
        .whatsapp-btn {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="brown-theme">
    <div class="brand-header">Owl Watcher 🦉</div>
    <h1 id="societyHeader">Initializing...</h1>
    
    <div id="eventDetails">
        <div id="dispSummaryContent"></div>
        <div id="adminContactContainer" style="margin-top: 15px;"></div>
    </div>

    <div id='calendar'></div>

    <div style="text-align: center; margin-top: 15px;">
        <a href="index.html" class="back-btn">Back</a>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script type="module">
    import { db } from "./app.js"; 
    import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let facilityMap = {};
    let allLoadedBookings = [];
    let societyAdminPhone = ""; 

    function showSummaryForDate(dateStr, bookings) {
        const summaryContent = document.getElementById('dispSummaryContent');
        const adminContactContainer = document.getElementById('adminContactContainer');
        
        let html = `<div style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 5px;"><b>${dateStr}</b></div>`;
        
        if (bookings.length > 0) {
            html += `<strong>Bookings Summary:</strong><br>`;
            bookings.forEach(b => {
                const readableName = facilityMap[b.facilityId] || b.facilityId;
                const startTime = formatTimeString(b.start);
                const endTime = formatTimeString(b.end);
                html += `
                    <div style="background: #f4ece0; padding: 6px; margin-top: 5px; border-radius: 6px; font-size: 0.9rem; text-align: left;">
                        <b>${readableName}</b><br>
                        <span>${startTime} - ${endTime}</span>
                    </div>
                `;
            });
        } else {
            html += `<p style="color: #7f8c8d; font-size: 0.95rem; margin: 5px 0;">No bookings on this day.</p>`;
        }

        summaryContent.innerHTML = html;

        if (societyAdminPhone) {
            const msgText = bookings.length > 0 
                ? `Hi, I have an inquiry regarding bookings on ${dateStr}.` 
                : `Hi, I want to book a facility on ${dateStr}. Please assist.`;
            
            const encodedMsg = encodeURIComponent(msgText);
            adminContactContainer.innerHTML = `
                <a href="https://wa.me/${societyAdminPhone}?text=${encodedMsg}" target="_blank" class="whatsapp-btn">
                    💬 Contact Admin via WhatsApp
                </a>
            `;
        } else {
            adminContactContainer.innerHTML = "";
        }

        document.getElementById('eventDetails').style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const header = document.getElementById('societyHeader');
        const societyId = localStorage.getItem("savedSocietyId");
        const societyName = localStorage.getItem("savedSocietyName");

        if (!societyId || !societyName) {
            header.innerText = "Error: No society selected";
            return;
        }

        header.innerText = `${societyName} Facility Calendar`;

        // 1. Fetch Facility Mapping and Admin Details First
        try {
            const facDocSnap = await getDoc(doc(db, "facilities", societyId));
            if (facDocSnap.exists()) {
                facilityMap = facDocSnap.data();
            }

            const adminQuery = query(collection(db, "admins"), where("society", "==", societyName));
            const adminSnap = await getDocs(adminQuery);
            if (!adminSnap.empty) {
                societyAdminPhone = adminSnap.docs[0].data().phone || "";
            }
        } catch (e) { console.error("Error loading metadata:", e); }

        // 2. Fetch Bookings BEFORE Rendering Calendar so data is ready for cell mounting
        try {
            const q = query(collection(db, "bookings"), where("society", "==", societyId));
            const snapshot = await getDocs(q);
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                allLoadedBookings.push({ id: docSnap.id, ...data });
            });
        } catch (e) { console.error("Error loading bookings:", e); }

        // 3. Initialize and Render Calendar AFTER Data is Loaded
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,today,next', center: 'title', right: '' },
            
            dayCellDidMount: (info) => {
                const cellDateStr = info.date.toLocaleDateString('en-CA');
                const dayBookings = allLoadedBookings.filter(b => b.start && b.start.startsWith(cellDateStr));

                if (dayBookings.length > 0) {
                    const badge = document.createElement('div');
                    badge.className = 'booking-count-badge';
                    badge.innerText = `${dayBookings.length}📒`;
                    
                    badge.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showSummaryForDate(cellDateStr, dayBookings);
                    });

                    info.el.querySelector('.fc-daygrid-day-frame').appendChild(badge);
                }
            },

            dateClick: (info) => {
                const dayBookings = allLoadedBookings.filter(b => b.start && b.start.startsWith(info.dateStr));
                showSummaryForDate(info.dateStr, dayBookings);
            }
        });
        calendar.render();
    });

    function formatTimeString(isoString) {
        if (!isoString) return '';
        const timePart = isoString.split('T')[1];
        if (!timePart) return '';
        const [hour, minute] = timePart.split(':');
        const h = parseInt(hour, 10);
        const ampm = h >= 12 ? 'pm' : 'am';
        const formattedHour = h % 12 || 12;
        return `${formattedHour}:${minute} ${ampm}`;
    }
</script>

    <!-- Paste this anywhere in your HTML file (preferably just before the closing </body> tag) -->

<div id="owl-container">
  <!-- Owl Icon Container -->
  <div id="owl-icon" onclick="activateOwlEffect()">
    🦉
  </div>
  <!-- Audio element playing theme.mp3 -->
  <audio id="owl-audio" src="theme.mp3" preload="auto"></audio>
</div>

<style>
  #owl-container {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
  }

  #owl-icon {
    font-size: 60px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
  }

  #owl-icon:hover {
    transform: scale(1.15);
  }

  /* Animation for Enlarging and Shrinking 2 Times */
  @keyframes enlargeAndShrinkTwice {
    0% { transform: scale(1); }
    25% { transform: scale(1.6); }
    50% { transform: scale(1); }
    75% { transform: scale(1.6); }
    100% { transform: scale(1); }
  }

  .active-effect {
    animation: enlargeAndShrinkTwice 2s ease-in-out forwards;
  }
</style>

<script>
  function activateOwlEffect() {
    const container = document.getElementById('owl-container');
    const audio = document.getElementById('owl-audio');

    // Prevent spam clicking while animation is active
    if (container.classList.contains('active-effect')) return;

    // Play the theme audio
    audio.currentTime = 0;
    audio.play().catch(error => {
      console.log("Audio playback blocked or file not found:", error);
    });

    // Trigger the enlarge and shrink animation (lasts 2 seconds)
    container.classList.add('active-effect');

    // Reset after the animation finishes
    setTimeout(() => {
      container.classList.remove('active-effect');
    }, 2000);
  }
</script>
    
</body>
</html>
