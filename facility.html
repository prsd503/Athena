<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Watcher | Booking Calendar</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <!-- FullCalendar CSS & JS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    
    <style>
        body { font-family: 'Caveat', cursive; background-color: #fdf6e3; color: #5d4037; padding: 20px; }
        .brown-theme { 
            background-color: #f4ece0; padding: 20px; border-radius: 16px; 
            border: 2px solid #8d6e63; max-width: 800px; margin: 0 auto; 
        }
        #calendar { background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .contact-box { text-align: center; margin-top: 20px; }
        .wa-link { text-decoration: none; color: #8d6e63; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="brown-theme">
    <h1 style="text-align: center;" id="societyTitle">Facility Calendar</h1>
    
    <!-- Calendar Display -->
    <div id='calendar'></div>

    <!-- Contact Admin Link -->
    <div class="contact-box">
        <a id="waContactLink" href="#" target="_blank" class="wa-link">
            💬 Contact Society Admin for Booking
        </a>
    </div>
</div>

<script type="module">
    import { db } from "./app.js"; 
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const targetSociety = urlParams.get('society');

    document.addEventListener('DOMContentLoaded', async () => {
        if (!targetSociety) return alert("Society not found.");
        
        document.getElementById('societyTitle').innerText = `${targetSociety} Facility Calendar`;
        document.getElementById('waContactLink').href = `https://wa.me/919033406816?text=Hello, I would like to book a facility in ${targetSociety}`;

        await renderCalendar(targetSociety);
    });

    async function renderCalendar(societyName) {
        const events = [];
        const q = query(collection(db, "bookings"), where("society", "==", societyName));
        const snapshot = await getDocs(q);
        
        snapshot.forEach(doc => {
            const data = doc.data();
            events.push({ 
                title: data.facility, // Shows facility name on the calendar
                start: data.start 
            });
        });

        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: events,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' }
        });
        calendar.render();
    }
</script>

</body>
</html>
