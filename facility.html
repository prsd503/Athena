<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facility Calendar</title>
    <!-- CORRECTED CSS LINK -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 20px; }
        .brown-theme { background-color: #f4ece0; padding: 20px; border-radius: 16px; border: 2px solid #8d6e63; max-width: 400px; margin: 0 auto; }
        #calendar { background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        
        /* Summary Box */
        #eventDetails { 
            background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; 
            border: 1px solid #8d6e63; text-align: center; display: none;
        }
        
        /* Forces dots: Hides title and time text inside the calendar */
        .fc-event-title, .fc-event-time { display: none !important; }
        .fc-event { border-radius: 50% !important; width: 10px !important; height: 10px !important; margin: 0 auto !important; }
    </style>
</head>
<body>

<div class="brown-theme">
    <h1 style="text-align: center; font-size: 24px;">Aangan Facility Calendar</h1>
    
    <div id="eventDetails">
        <strong>Facility:</strong> <span id="dispFacility"></span><br>
        <strong>Time:</strong> <span id="dispTime"></span>
    </div>

    <div id='calendar'></div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script type="module">
    import { db } from "./app.js"; 
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
        const calendarEl = document.getElementById('calendar');
        const detailsBox = document.getElementById('eventDetails');
        
        // 1. Fetch Facility Name Mapping first
        const facilityMap = {};
        const facSnapshot = await getDocs(collection(db, "facilities"));
        facSnapshot.forEach(doc => {
            // Assuming your facilities documents have a 'name' field and ID is the facility identifier (e.g., F5)
            facilityMap[doc.id] = doc.data().name || doc.id; 
        });

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,today,next', center: 'title', right: '' },
            dateClick: function(info) {
                const dayBookings = calendar.getEvents().filter(e => e.startStr.split('T')[0] === info.dateStr);
                
                if (dayBookings.length > 0) {
                    const event = dayBookings[0];
                    // Look up the readable name from our map
                    const displayName = facilityMap[event.title] || event.title;
                    
                    document.getElementById('dispFacility').innerText = displayName;
                    document.getElementById('dispTime').innerText = 
                        `${formatTime(event.start)} - ${formatTime(event.end)}`;
                    detailsBox.style.display = 'block';
                } else {
                    detailsBox.style.display = 'none';
                }
            }
        });
        calendar.render();

        function formatTime(date) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
        }

        // 2. Fetch bookings
        try {
            const q = query(collection(db, "bookings"), where("society", "==", "Aangan"));
            const snapshot = await getDocs(q);
            
            snapshot.forEach(doc => {
                const data = doc.data();
                calendar.addEvent({ 
                    title: data.facilityId, // This is still the ID (e.g., "F5")
                    start: data.start, 
                    end: data.end
                });
            });
        } catch (error) { console.error("Error loading bookings:", error); }
    });
</script>
</body>
</html>
