<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Watcher | Facility Booking</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <!-- Load FullCalendar JS globally -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    
    <style>
        body { font-family: 'Caveat', cursive; background-color: #fdf6e3; color: #5d4037; padding: 20px; }
        .brown-theme { 
            background-color: #f4ece0; padding: 20px; border-radius: 16px; 
            border: 2px solid #8d6e63; max-width: 800px; margin: 0 auto; 
        }
        .control-group { margin-bottom: 20px; text-align: center; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #8d6e63; }
        button { background: #8d6e63; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        #calendar { margin-top: 20px; background: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="brown-theme">
    <h1 style="text-align: center;" id="societyTitle">Booking Facility Portal</h1>
    
    <!-- Booking Form -->
    <div class="control-group">
        <select id="facilitySelect"><option>Loading...</option></select>
        <input type="date" id="bookingDate">
        <button id="bookFacilityBtn">Confirm Booking</button>
    </div>

    <!-- Calendar Container -->
    <div id='calendar'></div>

    <!-- Contact Admin -->
    <div style="text-align: center; margin-top: 20px;">
        <a id="waContactLink" href="#" target="_blank" style="text-decoration: none; color: #8d6e63; font-weight: bold;">
            💬 Contact Society Admin for Assistance
        </a>
    </div>
</div>

<script type="module">
    import { db } from "./app.js"; 
    import { doc, getDoc, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const targetSociety = urlParams.get('society');

    document.addEventListener('DOMContentLoaded', async () => {
        if (!targetSociety) {
            alert("No society selected.");
            return;
        }

        document.getElementById('societyTitle').innerText = `Booking Portal: ${targetSociety}`;
        document.getElementById('waContactLink').href = `https://wa.me/919033406816?text=Hello, I need help booking a facility in ${targetSociety}`;

        await loadFacilities(targetSociety);
        await renderCalendar(targetSociety);

        document.getElementById('bookFacilityBtn').addEventListener('click', handleBooking);
    });

    async function loadFacilities(societyName) {
        try {
            const docSnap = await getDoc(doc(db, "facilities", societyName));
            const select = document.getElementById('facilitySelect');
            if (docSnap.exists()) {
                select.innerHTML = docSnap.data().list.map(f => `<option value="${f}">${f}</option>`).join('');
            } else {
                select.innerHTML = `<option>No facilities</option>`;
            }
        } catch (e) { console.error(e); }
    }

    async function renderCalendar(societyName) {
        const bookings = [];
        const q = query(collection(db, "bookings"), where("society", "==", societyName));
        const snapshot = await getDocs(q);
        snapshot.forEach(doc => bookings.push(doc.data()));

        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: bookings
        });
        calendar.render();
    }

    async function handleBooking() {
        const fName = document.getElementById('facilitySelect').value;
        const date = document.getElementById('bookingDate').value;
        if (!fName || !date) return alert("Please select a facility and a date.");
        
        try {
            await addDoc(collection(db, "bookings"), {
                society: targetSociety,
                facility: fName,
                start: date,
                title: `Booked: ${fName}`,
                createdAt: serverTimestamp()
            });
            alert("Booking confirmed!");
            location.reload();
        } catch (e) { alert("Error: " + e.message); }
    }
</script>

</body>
</html>
