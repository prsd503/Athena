<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Calendar</title>
    
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <!-- FullCalendar JS -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 20px; }
        .brown-theme { background-color: #f4ece0; padding: 20px; border-radius: 16px; border: 2px solid #8d6e63; max-width: 800px; margin: 0 auto; }
        
        /* CRITICAL: Calendar MUST have a height */
        #calendar { 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            height: 500px; 
            width: 100%;
        }
    </style>
</head>
<body>

<div class="brown-theme">
    <h1 style="text-align: center;" id="societyTitle">Aangan Facility Calendar</h1>
    <div id='calendar'></div>
    <div style="text-align: center;">
        <a id="waContactLink" href="#" target="_blank">💬 Contact Society Admin for Booking</a>
    </div>
</div>

<script type="module">
    import { db } from "./app.js"; 
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const targetSociety = urlParams.get('society') || "Aangan"; // Default for testing

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('societyTitle').innerText = `${targetSociety} Facility Calendar`;
        document.getElementById('waContactLink').href = `https://wa.me/919033406816?text=Hello, I want to book a facility in ${targetSociety}`;

        // 1. Fetch data FIRST
        const q = query(collection(db, "bookings"), where("society", "==", targetSociety));
        const snapshot = await getDocs(q);
        
        const fetchedEvents = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            fetchedEvents.push({ 
                title: data.title || data.facility, // Uses your Firestore title format
                start: data.start 
            });
        });

        // 2. Initialize calendar WITH the events
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: fetchedEvents, // Pass data here
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth'
            },
            eventColor: '#8d6e63' // Matches your theme
        });
        
        calendar.render();
    });
</script>

</body>
</html>
