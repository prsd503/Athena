<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facility Calendar</title>
    
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
   
    <style>
        body { font-family: sans-serif; background-color: #fdf6e3; padding: 20px; }
        .brown-theme { background-color: #f4ece0; padding: 20px; border-radius: 16px; border: 2px solid #8d6e63; max-width: 800px; margin: 0 auto; }
        
        /* CRITICAL: Calendar MUST have a height */
        #calendar { 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            height: 500px; 
            width: 100%;
        }
    </style>
</head>
<body>

<div class="brown-theme">
    <h1 style="text-align: center;" id="societyTitle">Aangan Facility Calendar</h1>
    <div id='calendar'></div>
    <div style="text-align: center;">
        <a id="waContactLink" href="#" target="_blank">💬 Contact Society Admin for Booking</a>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<script type="module">
    import { db } from "./app.js"; 
    import { collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    document.addEventListener('DOMContentLoaded', async () => {
        const calendarEl = document.getElementById('calendar');
        
        // Initialize Calendar IMMEDIATELY
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridDay' },
            eventTimeFormat: { hour: 'numeric', minute: '2-digit', meridiem: 'short' },
            displayEventTime: true
        });
        calendar.render(); // Always render the calendar first

        // Then attempt to load data
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const targetSociety = urlParams.get('society') || "Aangan"; 
            
            const facilityDoc = await getDoc(doc(db, "facilities", targetSociety));
            const facilityMap = facilityDoc.exists() ? facilityDoc.data() : {};

            const q = query(collection(db, "bookings"), where("society", "==", targetSociety));
            const snapshot = await getDocs(q);
            
            snapshot.forEach(doc => {
                const data = doc.data();
                calendar.addEvent({ 
                    title: facilityMap[data.facilityId] || data.facilityId || "Booked", 
                    start: data.start, 
                    end: data.end, 
                    allDay: false 
                });
            });
        } catch (e) {
            console.error("Data load error (calendar will still show):", e);
        }
    });
</script>

</body>
</html>
