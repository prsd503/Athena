<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finder Owl Admin</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; margin-bottom: 20px; }
        input { width: 90%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div class="card" id="login-section">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <!-- Search Section (Visible after login) -->
    <div class="card" id="search-section" style="display:none;">
        <h2>Search to Edit/Delete</h2>
        <input type="text" id="adminSearch" placeholder="Vehicle Number">
        <button id="adminSearchBtn">Search</button>
        <div id="admin-results"></div>
    </div>
    
    <!-- Data Entry Section -->
    <div class="card" id="data-section" style="display:none;">
        <h2>Add Vehicle</h2>
        <input type="text" id="vNum" placeholder="Vehicle Number">
        <input type="text" id="fNum" placeholder="Flat Number">
        <!-- Society Name input removed as it is now fixed in logic -->
        <button id="saveBtn">Save to Registry</button>
    </div>

    <!-- Dashboard Section -->
    <div class="card" id="admin-dashboard" style="display:none;">
        <h2>Manage Registry</h2>
        <div id="vehicle-list"></div>
    </div>


    <!-- Custom Modal -->
    <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; backdrop-filter: blur(5px);">
    <div style="background:white; margin: 20% auto; padding:20px; width:80%; max-width:300px; border-radius:15px; text-align:center; border: 2px solid #8d6e63;">
        <p id="modalMessage"></p>
        <input type="text" id="waMessage" placeholder="Type message..." style="display:none; width:90%;">
        <div style="display:flex; justify-content:center; gap:10px;">
            <button id="modalActionBtn" style="display:none;" onclick="sendWhatsAppFinal()">Send</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
</div>


    <script type="module" src="admin-logic.js"></script>
</body>
</html>
