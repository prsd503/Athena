<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Caveat', cursive; padding: 20px; background: #f4f4f9; }
        .hidden { display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>
    <div id="login-section" class="card">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div id="data-section" class="hidden">
        <div class="card">
            <h2>Add New Vehicle</h2>
            <input id="vNumber" placeholder="Vehicle Number">
            <input id="mNumber" placeholder="Mobile Number">
            <input id="flatNum" placeholder="Flat Number">
            <button id="saveBtn">Save Vehicle</button>
        </div>
        <div class="card">
            <h2>Search Vehicles</h2>
            <input id="searchQuery" placeholder="Enter Vehicle Number">
            <button id="searchBtn">Search</button>
            <div id="results"></div>
        </div>
    </div>
    <script type="module" src="admin-logic.js"></script>
</body>
</html>
