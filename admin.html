<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finder Owl Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Caveat', cursive; color: #5D4037; background: #fdf5e6; }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; border: 2px solid #5D4037; border-radius: 15px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #5D4037; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="login-view">
        <h1>Finder Owl 🦉</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="window.handleLogin()">Login</button>
    </div>

    <div class="container" id="admin-view" style="display:none;">
        <h2>Society: <span id="society-name"></span></h2>
        <input type="text" id="v-num" placeholder="Vehicle Number">
        <input type="text" id="f-num" placeholder="Flat Number">
        <input type="text" id="m-num" placeholder="WhatsApp Mobile (e.g., 919876543210)">
        <button onclick="window.addVehicle()">Add Vehicle</button>
        <hr>
        <input type="text" id="search" placeholder="Search Vehicle..." onkeyup="window.searchVehicles()">
        <div id="vehicle-list"></div>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module" src="admin-logic.js"></script>
</body>
</html>
