<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finder Owl Admin</title>
    <style>
        body { font-family: 'Caveat', cursive; color: #5D4037; background: #fdf5e6; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { border: 2px solid #5D4037; padding: 20px; border-radius: 15px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #5D4037; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="login-view">
        <div class="card">
            <h1>Finder Owl 🦉</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div class="container" id="admin-view" style="display:none;">
        <h2>Society Dashboard: <span id="society-name"></span></h2>
        
        <h3>Add New Vehicle</h3>
        <input type="text" id="v-num" placeholder="Vehicle Number">
        <input type="text" id="f-num" placeholder="Flat Number">
        <input type="text" id="m-num" placeholder="Mobile Number">
        <button onclick="addVehicle()">Add Entry</button>

        <h3>Manage Vehicles</h3>
        <input type="text" id="search" placeholder="Search by Vehicle Number..." onkeyup="searchVehicles()">
        <div id="vehicle-list"></div>
    </div>
    <script type="module" src="app.js"></script>
    <script type="module" src="admin-logic.js"></script>
</body>
</html>
