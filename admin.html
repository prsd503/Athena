<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Owl Watch | Admin</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; margin-bottom: 25px; }
        h1 { margin-top: 0; }
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top: 10px; border: 2px solid #5d4037; transition: 0.3s; }
        button:hover { background: #5d4037; }
        #admin-results { margin-top: 15px; font-size: 1.2rem; text-align: left; }
        .disclaimer { font-size: 0.9rem; color: #795548; margin-top: 10px; padding: 5px; border: 1px dashed #8d6e63; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Owl Watch 🦉</h1>
        <p>Admin Portal</p>
    </div>

    <div class="card" id="login-section">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div class="card" id="search-section" style="display:none;">
        <h2>Search to Edit/Delete</h2>
        <input type="text" id="adminSearch" placeholder="Enter Vehicle Number">
        <button id="adminSearchBtn">Search</button>
        <button id="logoutBtn" style="background:#d32f2f;">Logout</button>
        
        <hr style="margin:20px 0;">
        
        <h3>Bulk Data Management</h3>
        <input type="file" id="excelInput" accept=".csv" style="font-size: 0.9rem;">
        <button id="importBtn">Bulk Import CSV</button>
        <button id="downloadTemplateBtn" style="background:#6d4c41;">Download Blank CSV Template</button>
        <button id="exportBtn" style="background:#25D366;">Download All as CSV</button>
        
        <div class="disclaimer">
            * Import processes 500 records at a time.
        </div>
        <div id="admin-results"></div>
    </div>

    <div class="card" id="data-section" style="display:none;">
        <h2>Add Vehicle</h2>
        <input type="text" id="vNum" placeholder="Vehicle Number">
        <input type="text" id="fNum" placeholder="Flat Number">
        <input type="text" id="mNum" placeholder="Mobile Number (e.g. 919876543210)">
        <button id="saveBtn">Save to Registry</button>
    </div>

    <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; backdrop-filter: blur(5px);">
        <div style="background:white; margin: 20% auto; padding:20px; width:80%; max-width:300px; border-radius:20px; text-align:center; border: 2px solid #8d6e63;">
            <p id="modalMessage" style="color: #5d4037;"></p>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script type="module" src="admin-logic.js"></script>
</body>
</html>
