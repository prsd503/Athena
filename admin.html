<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <title>Finder Owl | Admin Portal</title>
    <style>
        body { font-family: 'Caveat', cursive; background: #fdf6e3; color: #5d4037; text-align: center; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 20px; border: 2px solid #8d6e63; box-shadow: 5px 5px 0px #8d6e63; max-width: 400px; margin: auto; margin-bottom: 20px; }
        h1 { color: #5d4037; font-size: 2.5rem; margin-bottom: 10px; }
        h2 { color: #5d4037; margin-top: 0; }
        input { width: 85%; padding: 10px; border: 2px solid #8d6e63; border-radius: 10px; font-size: 1.2rem; margin-bottom: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Finder Owl 🦉</h1>
        <h3>Admin Portal</h3>
    </div>

    <div class="card" id="login-section">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>

    <div class="card" id="search-section" style="display:none;">
        <h2>Search to Edit/Delete</h2>
        <input type="text" id="adminSearch" placeholder="Vehicle Number">
        <button id="adminSearchBtn">Search</button>
        <div id="admin-results" style="margin-top:20px; text-align:left;"></div>
    </div>
    
    <div class="card" id="data-section" style="display:none;">
        <h2>Add Vehicle</h2>
        <input type="text" id="vNum" placeholder="Vehicle Number">
        <input type="text" id="fNum" placeholder="Flat Number">
        <input type="text" id="mobileNum" placeholder="Owner Mobile (e.g., 91XXXXXXXXXX)">
        <button id="saveBtn">Save to Registry</button>
    </div>

    <div id="customModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div style="background:white; margin: 20% auto; padding:20px; width:80%; max-width:300px; border-radius:15px; text-align:center; border: 2px solid #8d6e63;">
            <p id="modalMessage" style="font-size: 1.2rem; font-family: 'Caveat', cursive; color: #5d4037;"></p>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

    <script type="module" src="admin-logic.js"></script>
</body>
</html>
